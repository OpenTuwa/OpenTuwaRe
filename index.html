<!DOCTYPE html>
<html class="scroll-smooth antialiased" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>OpenTuwa | Stories</title>
  
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet"/>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
  <script>
    tailwind.config = { 
      theme: { 
        extend: { 
          colors: { 
            'tuwa-black': '#050505', // Slightly deeper black for better OLED contrast
            'tuwa-gray': '#111111', 
            'tuwa-text': '#e5e5e5', 
            'tuwa-muted': '#a1a1aa', 
            'tuwa-accent': '#3b82f6', 
            'tuwa-gold': '#d4af37' 
          }, 
          fontFamily: { 
            sans: ['Inter', 'sans-serif'], 
            heading: ['Plus Jakarta Sans', 'sans-serif'] 
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        } 
      } 
    }
  </script>
  <style>
    body { background-color: var(--tuwa-black, #050505); color: #e5e5e5; }
    ::selection { background: #3b82f6; color: #fff; }
    
    /* Premium Glassmorphism */
    .glass-header {
      background: rgba(5, 5, 5, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Cinematic Card Hover */
    .card-hover {
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card-hover:hover {
      transform: translateY(-4px);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-tuwa-accent selection:text-white font-sans">

  <header class="glass-header sticky top-0 z-50 transition-all duration-300">
    <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 group">
        <div class="w-8 h-8 rounded-lg bg-white flex items-center justify-center group-hover:bg-tuwa-accent transition-colors duration-300 shadow-[0_0_15px_rgba(255,255,255,0.2)]">
          <span class="text-black font-heading font-bold text-lg group-hover:text-white transition-colors duration-300">T</span>
        </div>
        <span class="font-heading font-bold text-xl tracking-tight text-white group-hover:text-tuwa-accent transition-colors duration-300">OpenTuwa</span>
      </a>
      <nav class="hidden md:flex gap-8 text-sm font-medium text-tuwa-muted">
        <a href="/" class="text-white transition-colors">Stories</a>
        <a href="#" class="hover:text-white transition-colors">Topics</a>
        <a href="#" class="hover:text-white transition-colors">About</a>
      </nav>
    </div>
  </header>

  <main class="flex-grow max-w-6xl mx-auto w-full px-6 py-16">
    
    <div class="mb-16 animate-fade-in-up">
      <h1 class="text-4xl md:text-5xl font-heading font-bold text-white mb-4 tracking-tight">Latest Stories</h1>
      <p class="text-lg text-tuwa-muted max-w-2xl leading-relaxed">Explore the latest thoughts, tutorials, and insights from the OpenTuwa network.</p>
    </div>

    <div id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-12">
      <div class="animate-pulse">
        <div class="w-full h-64 bg-tuwa-gray rounded-2xl mb-6"></div>
        <div class="h-4 bg-tuwa-gray rounded w-1/4 mb-4"></div>
        <div class="h-8 bg-tuwa-gray rounded w-3/4 mb-4"></div>
        <div class="h-4 bg-tuwa-gray rounded w-full mb-2"></div>
        <div class="h-4 bg-tuwa-gray rounded w-2/3"></div>
      </div>
      <div class="animate-pulse hidden md:block">
        <div class="w-full h-64 bg-tuwa-gray rounded-2xl mb-6"></div>
        <div class="h-4 bg-tuwa-gray rounded w-1/4 mb-4"></div>
        <div class="h-8 bg-tuwa-gray rounded w-3/4 mb-4"></div>
      </div>
    </div>

  </main>

  <footer class="border-t border-white/5 py-12 mt-12 bg-tuwa-gray/30">
    <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
      <p class="text-tuwa-muted text-sm">© 2026 Tuwa Media. All rights reserved.</p>
      <div class="flex gap-6 text-sm text-tuwa-muted">
        <a href="#" class="hover:text-white transition-colors">Twitter</a>
        <a href="#" class="hover:text-white transition-colors">GitHub</a>
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const grid = document.getElementById('articles-grid');
      
      try {
        const response = await fetch('/api/articles');
        if (!response.ok) throw new Error('Failed to fetch');
        
        const articles = await response.json();
        if (!articles.length) {
          grid.innerHTML = '<p class="text-tuwa-muted text-lg col-span-full py-10">No stories found. Check back soon!</p>';
          return;
        }

        grid.innerHTML = articles.map((article, index) => {
          const dateStr = article.published_at ? new Date(article.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
          const tagsHtml = article.tags ? article.tags.split(',').slice(0, 2).map(tag => 
            `<span class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-[10px] tracking-wider font-bold uppercase text-white/80">${tag.trim()}</span>`
          ).join('<span class="w-2"></span>') : '';

          const imgUrl = article.image_url || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&auto=format&fit=crop';
          const authorName = article.author || 'Tuwa Media';
          
          // Stagger the animation delay based on index
          const delay = index * 100;

          return `
            <a href="/articles/${article.slug}" class="group block card-hover animate-fade-in-up" style="animation-delay: ${delay}ms; opacity: 0;">
              <div class="w-full h-64 rounded-2xl overflow-hidden mb-6 relative bg-tuwa-gray border border-white/5">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                <img src="${imgUrl}" alt="${article.title}" class="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105" loading="lazy">
              </div>
              <div class="flex items-center mb-4">${tagsHtml}</div>
              <h2 class="text-2xl font-bold font-heading text-white/95 mb-3 group-hover:text-tuwa-accent transition-colors leading-tight tracking-tight">${article.title}</h2>
              <p class="text-tuwa-muted text-sm line-clamp-2 mb-5 leading-relaxed">${article.subtitle || article.seo_description || ''}</p>
              <div class="flex items-center text-xs text-tuwa-muted font-medium">
                <div class="w-6 h-6 rounded-full bg-tuwa-gray border border-white/10 flex items-center justify-center mr-2 text-[10px] text-white/70">
                  ${authorName.charAt(0).toUpperCase()}
                </div>
                <span class="hover:text-white transition-colors z-10">${authorName}</span>
                <span class="px-2 opacity-50">•</span>
                <span>${dateStr}</span>
                <span class="px-2 opacity-50">•</span>
                <span>${article.read_time_minutes || 5} min read</span>
              </div>
            </a>
          `;
        }).join('');
      } catch (error) { 
        grid.innerHTML = `
          <div class="col-span-full py-12 px-6 border border-white/10 bg-tuwa-gray/30 rounded-2xl flex flex-col items-center text-center">
            <svg class="w-12 h-12 text-tuwa-muted mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <p class="text-tuwa-text font-medium text-lg">Unable to load stories</p>
            <p class="text-tuwa-muted text-sm mt-1">${error.message}</p>
          </div>`; 
      }
    });
  </script>
</body>
</html>
