<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>OpenTuwa | Archive</title>
  
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet"/>
  
  <!-- Using local Tailwind build: /assets/tuwa-tailwind.css; migrated styles in src/styles.css -->
  <!-- local Tailwind build in use; legacy tuwa-ui removed -->
  <link rel="stylesheet" href="/assets/tuwa-tailwind.css">
</head>
<body class="tuwa-upgrade">

  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:top-24 focus:left-6 z-60 bg-white/5 text-white px-3 py-2 rounded">Skip to content</a>

  <header role="banner" class="fixed top-0 w-full z-50 backdrop-blur-md bg-[rgba(10,10,11,0.8)] border-b border-white/5">
    <nav role="navigation" aria-label="Main" class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="flex items-center space-x-4">
        <a class="text-2xl font-extrabold tracking-tighter font-heading text-white" href="/">Tuwa</a>
        <div class="hidden md:flex space-x-6 text-sm font-medium text-tuwa-muted" id="primaryNavArchive">
          <a class="hover:text-white transition-colors" href="/">Stories</a>
          <a class="text-white transition-colors" href="/archive">Archive</a>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <button id="navToggleArchive" aria-controls="mobileNavArchive" aria-expanded="false" class="md:hidden p-2 rounded bg-white/3 text-white hover:bg-white/5 focus:outline-none focus:ring-2 focus:ring-tuwa-accent" aria-label="Toggle navigation">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h18M3 6h18M3 18h18"></path></svg>
        </button>

        <div id="mobileNavArchive" class="fixed inset-x-4 top-20 z-40 rounded-lg bg-[rgba(10,10,11,0.95)] border border-white/5 p-4 shadow-lg md:hidden hidden" role="menu" aria-labelledby="navToggleArchive">
          <a role="menuitem" href="/" class="block px-3 py-2 rounded text-white hover:bg-white/5">Stories</a>
          <a role="menuitem" href="/archive" class="block px-3 py-2 rounded text-tuwa-muted hover:text-white hover:bg-white/5">Archive</a>
        </div>
      </div>
    </nav>
  </header>

  <main id="main" role="main" class="pt-32 pb-20 px-6 max-w-3xl mx-auto min-h-screen">
    <div class="mb-16 border-b border-white/10 pb-10">
      <h1 class="text-5xl md:text-6xl font-extrabold font-heading text-white mb-4">The Archive</h1>
      <p class="text-xl text-tuwa-muted">A complete timeline of everything we've published.</p>
    </div>

    <div id="archive-container" class="space-y-16">
      <div class="py-10 text-center text-tuwa-muted animate-pulse">Scanning archives...</div>
    </div>
  </main>

  <footer role="contentinfo" class="py-12 px-6 border-t border-white/5">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
      <div class="text-xl font-extrabold font-heading text-white">OpenTuwa</div>
      <div class="flex space-x-8 text-xs font-bold tracking-widest uppercase text-tuwa-muted">
        <a class="hover:text-white transition-colors" href="https://opentuware.pages.dev/legal/" target="_blank">Terms & Privacy</a>
        <a class="hover:text-white transition-colors" href="https://opentuware.pages.dev/about/" target="_blank">About OpenTuwa</a>
        <a class="hover:text-white transition-colors" href="https://x.com/OpenTuwa" target="_blank">X (formerly Twitter)</a>
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('archive-container');
      
      try {
        const response = await fetch('/api/article');
        const articles = await response.json();
        
        if (articles.length === 0) {
          container.innerHTML = '<div class="text-tuwa-muted">The archive is currently empty.</div>';
          return;
        }

        // Group articles by Year automatically
        const grouped = articles.reduce((acc, article) => {
            const date = new Date(article.published_at || Date.now());
            const year = date.getFullYear();
            if (!acc[year]) acc[year] = [];
            acc[year].push(article);
            return acc;
        }, {});

        // Sort years descending
        const sortedYears = Object.keys(grouped).sort((a, b) => b - a);

        let html = '';
        sortedYears.forEach(year => {
            html += `
                <section>
                    <h2 class="text-3xl font-bold font-heading text-white mb-8 border-b border-white/5 pb-4">${year}</h2>
                    <div class="space-y-6">
            `;
            
            grouped[year].forEach(article => {
                const date = new Date(article.published_at || Date.now());
                const monthDay = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                
                html += `
                    <a href="/articles/${article.slug}" class="group flex flex-col md:flex-row md:items-center justify-between gap-2 md:gap-8 hover:bg-white/[0.02] p-4 -mx-4 rounded-xl transition-colors">
                        <div class="flex items-center gap-6 flex-1">
                            <span class="text-sm text-tuwa-muted w-16 shrink-0 font-medium">${monthDay}</span>
                            <h3 class="text-lg font-medium text-tuwa-text group-hover:text-tuwa-accent transition-colors leading-tight">
                                ${article.title}
                            </h3>
                        </div>
                        <div class="hidden sm:flex text-xs text-tuwa-muted shrink-0 uppercase tracking-widest font-bold">
                            ${article.tags ? article.tags.split(',')[0].trim() : 'Article'}
                        </div>
                    </a>
                `;
            });
            
            html += `</div></section>`;
        });

        container.innerHTML = html;

      } catch (error) {
        container.innerHTML = `<div class="text-red-500">Failed to load archive: ${error.message}</div>`;
      }
    });
    // Mobile nav toggle for archive
    const navToggleArchive = document.getElementById('navToggleArchive');
    const mobileNavArchive = document.getElementById('mobileNavArchive');
    if (navToggleArchive && mobileNavArchive) {
      navToggleArchive.addEventListener('click', () => {
        const expanded = navToggleArchive.getAttribute('aria-expanded') === 'true';
        navToggleArchive.setAttribute('aria-expanded', String(!expanded));
        mobileNavArchive.classList.toggle('hidden');
      });
      document.addEventListener('click', (e) => {
        if (!mobileNavArchive.contains(e.target) && !navToggleArchive.contains(e.target)) {
          mobileNavArchive.classList.add('hidden');
          navToggleArchive.setAttribute('aria-expanded', 'false');
        }
      });
    }
  </script>
</body>
</html>
