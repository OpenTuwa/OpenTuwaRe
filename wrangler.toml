name = "opentuware"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat_v2"]
pages_build_output_dir = ".vercel/output/static"

[ai]
binding = "AI"

# ==========================================
# THE X-RAY / MEMORY DATABASE
# ==========================================
[[kv_namespaces]]
binding = "BRAIN_KV"
id = "b77c25b5918a49eaae7bdb666d11c23d"
# Use remote KV in development
remote = true

# Vectorize bindings removed - now using pre-computed vectors in D1

[[d1_databases]]
binding = "DB"
database_name = "articles"
database_id = "5494913d-dde9-48ae-82a4-5774ed2b11a6"
# Use remote database in development
remote = true