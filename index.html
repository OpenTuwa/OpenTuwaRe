<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>OpenTuwa | Stories</title>
  
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet"/>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'tuwa-black': '#0a0a0b', 'tuwa-gray': '#161618', 'tuwa-text': '#e5e5e5',
            'tuwa-muted': '#a1a1aa', 'tuwa-accent': '#3b82f6', 'tuwa-gold': '#d4af37'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Plus Jakarta Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0a0a0b; color: #e5e5e5; -webkit-font-smoothing: antialiased; }
    .glass-header { backdrop-filter: blur(12px); background-color: rgba(10, 10, 11, 0.8); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .card-hover:hover img { transform: scale(1.05); }
  </style>
</head>
<body>

  <header class="fixed top-0 w-full z-50 glass-header">
    <nav class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="flex items-center space-x-8">
        <a class="text-2xl font-extrabold tracking-tighter font-heading text-white" href="/">Tuwa</a>
        <div class="hidden md:flex space-x-6 text-sm font-medium text-tuwa-muted">
          <a class="text-white transition-colors" href="/">Stories</a>
          <a class="hover:text-white transition-colors" href="/archive">Archive</a>
        </div>
      </div>
    </nav>
  </header>

  <!-- In your index.html -->

<main class="pt-32 pb-20 px-6 max-w-7xl mx-auto min-h-screen">
    
    <!-- Default / Tag Header -->
    <div id="default-header" class="mb-16">
      <h1 id="page-title" class="text-5xl md:text-6xl font-extrabold font-heading text-white mb-4">Latest Stories</h1>
      <p id="page-subtitle" class="text-xl text-tuwa-muted">Insights, deep dives, and perspectives from the OpenTuwa network.</p>
    </div>

    <!-- Author Profile Header (Hidden by default) -->
    <div id="author-header" class="hidden mb-20 text-center max-w-2xl mx-auto">
        <div class="relative inline-block mb-6">
            <div class="absolute inset-0 bg-tuwa-accent blur-xl opacity-20 rounded-full"></div>
            <img id="auth-avatar" src="" alt="Author" class="relative w-32 h-32 rounded-full object-cover border-2 border-white/10 shadow-2xl">
        </div>
        <h1 id="auth-name" class="text-4xl md:text-5xl font-extrabold font-heading text-white mb-3"></h1>
        <div id="auth-role" class="text-tuwa-accent font-bold tracking-widest uppercase text-xs mb-4"></div>
        <p id="auth-bio" class="text-lg text-tuwa-muted mb-6 leading-relaxed"></p>
        <div id="auth-socials" class="flex justify-center gap-4">
            <!-- Social links injected here -->
        </div>
    </div>

    <div id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
      <div class="col-span-full py-20 text-center text-tuwa-muted animate-pulse">Loading stories...</div>
    </div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Meta helpers for SEO and social previews
      function setMetaName(name, content) {
        if (!content && content !== '') return;
        let el = document.querySelector('meta[name="' + name + '"]');
        if (!el) { el = document.createElement('meta'); el.setAttribute('name', name); document.head.appendChild(el); }
        el.setAttribute('content', content || '');
      }
      function setMetaProperty(prop, content) {
        if (!content && content !== '') return;
        let el = document.querySelector('meta[property="' + prop + '"]');
        if (!el) { el = document.createElement('meta'); el.setAttribute('property', prop); document.head.appendChild(el); }
        el.setAttribute('content', content || '');
      }
      function setCanonical(url) {
        if (!url) return;
        let el = document.querySelector('link[rel="canonical"]');
        if (!el) { el = document.createElement('link'); el.setAttribute('rel', 'canonical'); document.head.appendChild(el); }
        el.setAttribute('href', url);
      }

      const grid = document.getElementById('articles-grid');
      const defaultHeader = document.getElementById('default-header');
      const authorHeader = document.getElementById('author-header');
      
      const urlParams = new URLSearchParams(window.location.search);
      const tagFilter = urlParams.get('tag');
      const authorFilter = urlParams.get('author');
      const qFilter = urlParams.get('q');

      // 1. Handle Header Display
      if (authorFilter) {
          // Switch to Author Mode
          defaultHeader.classList.add('hidden');
          authorHeader.classList.remove('hidden');
          
          // Fetch Author Details
          try {
            const authRes = await fetch(`/api/author?name=${encodeURIComponent(authorFilter)}`);
            if (authRes.ok) {
              const authData = await authRes.json();

              const displayName = authData.name || authorFilter;
              document.getElementById('auth-name').textContent = displayName;
              const avatarSrc = authData.avatar_url || authData.avatar || authData.image_url || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(displayName) + '&background=random';
              document.getElementById('auth-avatar').src = avatarSrc;
              document.getElementById('auth-role').textContent = authData.role || 'Contributor';
              document.getElementById('auth-bio').textContent = authData.bio || `Stories written by ${displayName}.`;

              if (authData.social_link) {
                document.getElementById('auth-socials').innerHTML = `
                  <a href="${authData.social_link}" target="_blank" class="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-full text-xs font-bold text-white transition-colors border border-white/5">
                    Follow on Social
                  </a>
                `;
              }

              // SEO / Social Meta for author page
              const pageUrl = window.location.href;
              setMetaProperty('og:type', 'profile');
              setMetaProperty('og:title', `${displayName} | OpenTuwa`);
              setMetaProperty('og:description', authData.bio || `Articles by ${displayName}`);
              setMetaProperty('og:image', avatarSrc);
              setMetaProperty('og:url', pageUrl);
              setMetaName('twitter:card', avatarSrc ? 'summary_large_image' : 'summary');
              setMetaName('twitter:title', `${displayName} | OpenTuwa`);
              setMetaName('twitter:description', authData.bio || `Articles by ${displayName}`);
              setMetaName('twitter:image', avatarSrc);
              setCanonical(pageUrl);

            } else {
              // Fallback rendering
              document.getElementById('auth-name').textContent = authorFilter;
              document.getElementById('auth-avatar').src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(authorFilter) + '&background=random';
              document.getElementById('auth-bio').textContent = `Articles contributed by ${authorFilter}.`;
              // Minimal meta for fallback
              setMetaProperty('og:title', `${authorFilter} | OpenTuwa`);
              setMetaProperty('og:description', `Articles by ${authorFilter}`);
              setCanonical(window.location.href);
            }
          } catch (e) {
            console.error("Error fetching author details", e);
          }

        } else if (tagFilter) {
          // Handle Tag Mode
          document.getElementById('page-title').textContent = `Topic: ${tagFilter}`;
          document.getElementById('page-subtitle').textContent = `Exploring stories related to ${tagFilter}`;
          // Set SEO meta for tag pages
          const tagPageUrl = window.location.href;
          setMetaProperty('og:type', 'website');
          setMetaProperty('og:title', `Tagged: ${tagFilter} | OpenTuwa`);
          setMetaProperty('og:description', `Stories and articles related to ${tagFilter}`);
          setMetaProperty('og:image', 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&auto=format&fit=crop');
          setMetaName('twitter:card', 'summary_large_image');
          setMetaName('twitter:title', `Tagged: ${tagFilter} | OpenTuwa`);
          setMetaName('twitter:description', `Stories and articles related to ${tagFilter}`);
          setCanonical(tagPageUrl);
        }
      
      // 2. Fetch and Filter Articles
      try {
        const response = await fetch('/api/article');
        let articles = await response.json();
        
        if (tagFilter) {
            articles = articles.filter(a => 
                a.tags && a.tags.split(',').map(t => t.trim().toLowerCase()).includes(tagFilter.toLowerCase())
            );
        }

        if (authorFilter) {
          articles = articles.filter(a => 
            a.author && a.author.trim().toLowerCase() === authorFilter.toLowerCase()
          );
        }

        if (qFilter && qFilter.trim() !== '') {
          const q = qFilter.trim().toLowerCase();
          articles = articles.filter(a => {
            const title = (a.title || '').toLowerCase();
            const subtitle = (a.subtitle || a.seo_description || '').toLowerCase();
            const tags = (a.tags || '').toLowerCase();
            const author = (a.author || '').toLowerCase();
            return title.includes(q) || subtitle.includes(q) || tags.includes(q) || author.includes(q);
          });
          document.getElementById('page-title').textContent = `Search: ${qFilter}`;
          document.getElementById('page-subtitle').textContent = `Results for "${qFilter}"`;
        }
        
        if (articles.length === 0) {
          grid.innerHTML = '<div class="col-span-full py-20 text-center text-tuwa-muted">No stories found.</div>';
          return;
        }

        grid.innerHTML = articles.map(article => {
          const dateStr = article.published_at ? new Date(article.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
          
          const tagsHtml = article.tags ? article.tags.split(',').slice(0, 2).map(t => 
            `<button onclick="event.preventDefault(); window.location.href='/?tag=${encodeURIComponent(t.trim())}'" class="text-[10px] uppercase tracking-wider font-bold text-tuwa-accent hover:text-white transition-colors cursor-pointer relative z-10">${t.trim()}</button>`
          ).join('<span class="text-tuwa-muted px-2">•</span>') : '';

          const imgUrl = (article.image_url && article.image_url.trim() !== '') ? article.image_url : 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800&auto=format&fit=crop';

          // MAKE AUTHOR CLICKABLE HERE
          const authorHtml = `<button onclick="event.preventDefault(); window.location.href='/?author=${encodeURIComponent(article.author)}'" class="hover:text-white hover:underline decoration-tuwa-accent/50 underline-offset-4 transition-all cursor-pointer">${article.author || 'Tuwa Media'}</button>`;

          return `
            <a href="/articles/${article.slug}" class="group block card-hover relative">
              <div class="w-full h-64 rounded-xl overflow-hidden mb-6 relative bg-tuwa-gray border border-white/5">
                <img src="${imgUrl}" alt="${article.title}" class="w-full h-full object-cover transition-transform duration-700 ease-out" loading="lazy">
              </div>
              <div class="flex items-center mb-3">
                ${tagsHtml}
              </div>
              <h2 class="text-2xl font-bold font-heading text-white mb-2 group-hover:text-tuwa-accent transition-colors leading-tight">${article.title}</h2>
              <p class="text-tuwa-muted text-sm line-clamp-2 mb-4">${article.subtitle || article.seo_description || ''}</p>
              <div class="flex items-center text-xs text-tuwa-muted font-medium">
                ${authorHtml}
                <span class="px-2">•</span>
                <span>${dateStr}</span>
                <span class="px-2">•</span>
                <span>${article.read_time_minutes || 5} min read</span>
              </div>
            </a>
          `;
        }).join('');
      } catch (error) {
        grid.innerHTML = `<div class="col-span-full py-20 text-center text-red-500">Failed to load stories: ${error.message}</div>`;
      }
    });
</script>
<!-- Floating player renderer for site pages -->
<div id="floating-player" aria-hidden="true">
  <button class="close" aria-label="Close">✕</button>
  <div class="thumb-wrap"><img id="floating-thumb" class="thumb" src="" alt=""></div>
  <div class="meta">
    <div>
      <div id="floating-title" class="title"></div>
      <div id="floating-sub" class="text-tuwa-muted text-xs"></div>
    </div>
    <div class="controls">
      <button id="floating-play">Play</button>
    </div>
  </div>
</div>
<script>
  (function(){
    function mountFloating(){
      try {
        const raw = localStorage.getItem('floatingVideo');
        if (!raw) return;
        const s = JSON.parse(raw);
        if (!s || !s.src) return;
        const el = document.getElementById('floating-player');
        const thumb = document.getElementById('floating-thumb');
        const title = document.getElementById('floating-title');
        const floatingPlay = document.getElementById('floating-play');
        const closeBtn = el.querySelector('.close');
        thumb.src = s.poster || s.src;
        title.textContent = s.title || 'Playing';
        el.classList.add('show');

        // Click navigates back to original article and stores desired time
        el.addEventListener('click', (ev)=>{
          // avoid clicks from control buttons
          if (ev.target === floatingPlay || ev.target === closeBtn) return;
          window.location.href = '/articles/' + encodeURIComponent(s.slug || '') ;
        });

        floatingPlay.addEventListener('click', (e)=>{
          e.stopPropagation();
          // open article and indicate it should autoplay (we store flag)
          localStorage.setItem('floatingRequested', JSON.stringify({slug: s.slug, seek: s.currentTime || 0, play:true}));
          window.location.href = '/articles/' + encodeURIComponent(s.slug || '');
        });

        closeBtn.addEventListener('click', (e)=>{
          e.stopPropagation();
          localStorage.removeItem('floatingVideo');
          el.classList.remove('show');
        });
      } catch(e){}
    }
    // Show only after small delay so it doesn't flash during quick navigation
    window.addEventListener('DOMContentLoaded', ()=> setTimeout(mountFloating, 250));
  })();
</script>
</body>
</html>
