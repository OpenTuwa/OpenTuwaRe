name = "opentuware"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat_v2"]
pages_build_output_dir = ".vercel/output/static"

[ai]
binding = "AI"

# ==========================================
# THE X-RAY / MEMORY DATABASE
# ==========================================
[[kv_namespaces]]
binding = "BRAIN_KV"
id = "b77c25b5918a49eaae7bdb666d11c23d"

[[vectorize]]
binding = "VECTORIZE_TEXT"
index_name = "tuwa-brain"

[[vectorize]]
binding = "VECTORIZE_VISION"
index_name = "tuwa-vision"

[[d1_databases]]
binding = "DB"
database_name = "articles"
database_id = "5494913d-dde9-48ae-82a4-5774ed2b11a6"
preview_database_id = "5494913d-dde9-48ae-82a4-5774ed2b11a6"